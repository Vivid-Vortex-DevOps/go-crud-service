name: PR Validation

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify dependencies
        run: go mod verify

      - name: Vet
        run: go vet ./...

      - name: Unit Tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out

      - name: Build
        run: go build -o /dev/null ./cmd/server/

      - name: Vulnerability Scan
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Helm Lint
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0
      - run: helm lint deployment/helm/

      - name: Helm Template (dev)
        run: helm template go-crud-service deployment/helm/ -f deployment/values/dev.yaml
