services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: go_service_db
      POSTGRES_USER: gouser
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required — see .env.example}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gouser -d go_service_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: "postgres://gouser:${POSTGRES_PASSWORD}@postgres:5432/go_service_db?sslmode=disable"
      SERVER_PORT: "8080"
      ENVIRONMENT: dev
      LOG_LEVEL: debug
      OTEL_SERVICE_NAME: go-crud-service
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
